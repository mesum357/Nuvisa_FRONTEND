# Render Blueprint — optional; mirror these settings in the Render dashboard.
# Required env vars (set in Render → Environment):
#   NEXT_PUBLIC_API_URL     — production NestJS backend (NOT localhost), baked into client bundle at build
#   BACKEND_API_URL         — same NestJS URL for server-side proxies (Stripe, CMS); set if NEXT_PUBLIC was wrong at build
#   DATABASE_URL / DIRECT_URL — Postgres for Prisma CMS routes
#   NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY — must match backend Stripe mode
services:
  - type: web
    name: nuvisa-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    # Only runs when DATABASE_URL is configured; omit preDeploy if CMS DB is external.
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_IMAGE_UNOPTIMIZED
        value: "true"
